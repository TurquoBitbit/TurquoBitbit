name: Sync to jeklII_branch and Rename README.md

on:
  push:
    branches:
      - master
    workflow_dispatch:

jobs:
  sync-and-rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Sync to target branch
        run: |
          git checkout jeklII_branch
          git merge master --no-edit

      - name: Rename README to index
        run: |
          if [ -f README.md ]; then
            git mv README.md index.md
            git commit -m "chore: rename README.md to index.md"
          fi

      - name: Push changes
        run: git push origin jeklII_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}