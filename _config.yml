title: "Turquo the Cabbit"
description: "Turquo the Cabbit"
theme: jekyll-theme-midnight


baseurl: "/TurquoBitbit"   # repo name — fixes all relative_url paths
url: "https://turquobitbit.github.io"

markdown: kramdown
permalink: none        # pages sit at /README_EN.html, no trailing slash
                       # so relative image paths like ./pic/ resolve correctly

header_pages: []

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Tell Jekyll to process these files even though they don't start with front matter
include:
  - index.md
  - README_EN.md
  - commissions/cardBadge.md
  - commissions/pulexStickerBase.md

# Don't build these into the site
exclude:
  - README.md