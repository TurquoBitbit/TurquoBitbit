<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      /* ── Background ── */
      body {
        background-color: #353535;
        margin: 0;
        padding: 0;
      }

      /* ── Images ── */
      .main-content img {
        border-radius: 8px;
        box-shadow: 0 0 20px 8px rgba(0, 0, 0, 0.5);
        max-width: 100%;
        height: auto;
      }

      .main-content {
        max-width: 60%;
        margin: 0 auto;
        padding: 2rem;
        font-size: 1.1rem;
        line-height: 1.6;
        color: #cacaca;
      }

      /* ── Links ── */
      .main-content a {
        color: #50d6a1;
      }
      .main-content a:hover {
        color: #a7ffd6;
        text-decoration: underline;
      }
      .main-content a:visited {
        color: #80c9a0;
      }

      /* ── Header + Footer shared style ── */
      .site-header,
      .site-footer {
        background-color: #222222;
        padding: 1rem 2rem;
        text-align: center;
      }
      .site-header a,
      .site-footer a {
        color: #cacaca;
        text-decoration: none;
        font-weight: bold;
      }
      .site-header a:hover,
      .site-footer a:hover {
        color: #a7ffd6;
        text-decoration: underline;
      }
      .site-header a:visited,
      .site-footer a:visited {
        color: #80c9a0;
      }

      /* ── Tablet (max 1024px) ── */
      @media (max-width: 1024px) {
        .main-content {
          max-width: 80%;
        }
      }

      /* ── Mobile (max 600px) ── */
      @media (max-width: 600px) {
        .main-content {
          max-width: 100%;
          padding: 1rem;
          font-size: 1rem;
          line-height: 1.7;
        }
      }

    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="{{ '/' | relative_url }}">韜光 TURQUO</a>
    </header>

    <section class="main-content">
      {{ content }}
    </section>

    <footer class="site-footer">
      <a href="{{ '/' | relative_url }}">韜光 TURQUO</a>
    </footer>
  </body>
</html>
