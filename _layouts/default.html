<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      /* ── Background ── */
      body {
        background-color: #353535;
        margin: 0;
        padding: 0;
      }

      /* ── Images ── */
      .main-content img {
        border-radius: 8px;
        box-shadow: 0 0 20px 8px rgba(0, 0, 0, 0.5);
        max-width: 100%;     /* never overflow their container */
        height: auto;        /* keep aspect ratio */
      }

      .main-content {
        max-width: 60%;
        margin: 0 auto;
        padding: 2rem;
        font-size: 1.1rem;
        line-height: 1.6;
        color: #cacaca;
      }

      /* ── Links ── */
      .main-content a {
        color: #50d6a1;
      }
      .main-content a:hover {
        color: #a7ffd6;
        text-decoration: underline;
      }
      .main-content a:visited {
        color: #80c9a0;
      }

      /* ── Footer ── */
      .site-footer {
        background-color: #222222;
        margin: 2rem -2rem -2rem -2rem;
        padding: 1rem 2rem;
        text-align: center;
      }
      .site-footer a {
        color: #cacaca;
        text-decoration: none;
        font-weight: bold;
      }
      .site-footer a:hover {
        color: #a7ffd6;
        text-decoration: underline;
      }
      .site-footer a:visited {
        color: #80c9a0;
      }

      /* ── Tablet (max 1024px) ── */
      @media (max-width: 1024px) {
        .main-content {
          max-width: 80%;
        }

        .main-content img {
          width: 100% !important;
          margin: 0.5rem 0;
          box-shadow: none;
          border-radius: 8px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        }
      }


      /* ── Mobile (max 600px) ── */
      @media (max-width: 600px) {
        .main-content {
          max-width: 100%;
          padding: 1rem;
          font-size: 1rem;
          line-height: 1.7;
        }

        .site-footer {
          margin: 1rem -1rem -1rem -1rem;
          padding: 0.8rem 1rem;
        }
      }

    </style>
  </head>
  <body>
    <section class="main-content">
      {{ content }}
      <footer class="site-footer">
        <a href="{{ '/' | relative_url }}">韜光 TURQUO</a>
      </footer>
    </section>
  </body>
</html>
