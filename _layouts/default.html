<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <!-- midnight theme CSS served by GitHub Pages -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      .main-content {
        max-width: 60%;
        margin: 0 auto;
        padding: 2rem;
        font-size: 1.2rem;   /* adjust: 1rem = default, 1.2rem = bigger, 1.4rem = large */
        line-height: 1.6;    /* slightly more breathing room between lines */
      }
    </style>
  </head>
  <body>
    <section class="main-content">
      {{ content }}
      <footer class="site-footer">
        <span class="site-footer-credits">{{ site.title }}</span>
      </footer>
    </section>
  </body>
</html>
